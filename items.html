<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="style.css" />
        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
        <script src="script.js"></script>
        <title>Lakeside Lost and Found</title>
    </head>
    <body>
        <header>
            <!-- Hamburger menu only on small screens and navigation bar on larger screens -->
            <div class="container">
                <h2><span>Lakeside </span>Lost and Found</h2>
                <nav>
                    <a href="index.html">Home</a>
                    <a href="items.html">Items</a>
                    <a href="report.html">Report Lost Item</a>
                    <a href="contact.html">Contact Us</a>
                </nav>
                <button class="hamburger">
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                </button>
            </div>
        </header>
        <!-- Other hero image and hero content -->
        <div class="hero-img">
            <div class="hero-content">
                <h1>Find your items</h1>
                <button onclick="window.location.href = 'items.html'">View Items</button>
            </div>
        </div>
        <div id="admin-panel" style="display: none">
            <button onclick="signOut()">Sign Out</button>
        </div>
        <main class="container">
            <section class="items-section">
                <h2>Lost Items</h2>
                <div id="items-grid" class="items-grid" class="loading-grid">
                    <p>Loading Items...</p>
                </div>
            </section>

        <div id="claim-modal" class="modal">
            <div class="modal-content" id="modal-body"></div>
        </div>
        <footer>
            <ul class="list-inline">
                <li class="list-inline-item"><a href="index.html">Home</a></li>
                <li class="list-inline-item"><a href="items.html">Items</a></li>
