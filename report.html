<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="style.css" />
        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
        <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
        <script src="script.js"></script>
        <title>Lakeside Lost and Found</title>
    </head>
    <body>
        <header>
            <!-- Hamburger menu only on small screens and navigation bar on larger screens -->
            <div class="container">
                <a href="index.html"><img src="files/ram.png" alt="Lakeside Logo" class="logo" /></a>
                <h2><span>Lakeside </span>Lost and Found</h2>
                <nav>
                    <a href="index.html">Home</a>
                    <a href="items.html" aria-label="lost item listing">Items</a>
                    <a href="report.html" aria-label="report a lost item that was found">Report Lost Item</a>
                    <a href="contact.html">Contact Us</a>
                </nav>
                <button class="hamburger" aria-label="Open navigational menu" aria-expanded="false">
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                </button>
            </div>
        </header>
        <!-- Other hero image and hero content -->
        <div class="hero-img report">
            <div class="hero-content">
                <h1>Found a lost item? Report it here!</h1>
                <button onclick="report()">Report Item</button>
            </div>
        </div>
        <div id="report-modal" class="modal">
            <div id="modal-body" class="modal-content"></div>
        </div>
        <footer>
            <ul class="list-inline">
                <li class="list-inline-item"><a href="index.html">Home</a></li>
                <li class="list-inline-item"><a href="items.html" aria-label="lost item listing">Items</a></li>
                <li class="list-inline-item"><a href="report.html" aria-label="report a lost item that was found">Report</a></li>
                <li class="list-inline-item"><a href="contact.html">Contact Us</a></li>
            </ul>
            <p class="copyright">Lakeside High School &copy; 2026</p>
        </footer>
    </body>
</html>
